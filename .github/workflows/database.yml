name: Pull and Save Database Docker Images

on:
  push:
    branches:
      - main
  schedule:
    - cron: '0 0 * * *'

jobs:

  MongoDB:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Pull and Save MongoDB Image 
        run: |
          docker pull mongo:5.0.26 
          docker save -o mongo:5.0.26 mongo-5.0.26.tar.gz 

      - name: Upload MongoDB Image Artifact 
        uses: actions/upload-artifact@v4
        with:
          name: mongo-5.0.26
          path: mongo-5.0.26.tar.gz

  MySQL:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Pull and Save MySQL Image as File  
        run: |
          docker pull mysql:8.0.36 
          docker save -o mysql:8.0.36 mysql-8.0.36.tar.gz 

      - name: Upload MySQL Image Artifact  
        uses: actions/upload-artifact@v4 
        with:
          name: mysql-8.0.36  
          path: mysql-8.0.36.tar.gz 
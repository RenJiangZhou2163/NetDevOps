name: Pull and Save Multiple Docker Images

on:
  push:
    branches:
      - main
  schedule:
    - cron: '0 0 * * *'

jobs:
  Zabbix:
    # docker pull zabbix/zabbix-server-pgsql:latest
    # docker pull zabbix/zabbix-proxy-mysql:latest
    # docker pull zabbix/zabbix-web-nginx-pgsql:latest
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Pull and save Zabbix Server PostgreSQL image
        run: |
          docker pull zabbix/zabbix-server-pgsql:latest
          docker save zabbix/zabbix-server-pgsql:latest zabbix-server-pgsql-latest.tar.gz

      - name: Upload Zabbix Server PostgreSQL image artifact
        uses: actions/upload-artifact@v4
        with:
          name: zabbix-server-pgsql-latest
          path: zabbix-server-pgsql-latest.tar.gz

      - name: Pull and save Zabbix Proxy MySQL image
        run: |
          docker pull zabbix/zabbix-proxy-mysql:latest
          docker save zabbix/zabbix-proxy-mysql:latest zabbix-proxy-mysql-latest.tar.gz

      - name: Upload Zabbix Proxy MySQL image artifact
        uses: actions/upload-artifact@v4
        with:
          name: zabbix-proxy-mysql-latest
          path: zabbix-proxy-mysql-latest.tar.gz

      - name: Pull and save Zabbix Web Nginx PostgreSQL image
        run: |
          docker pull zabbix/zabbix-web-nginx-pgsql:latest
          docker save zabbix/zabbix-web-nginx-pgsql:latest zabbix-web-nginx-pgsql-latest.tar.gz

      - name: Upload Zabbix Web Nginx PostgreSQL image artifact
        uses: actions/upload-artifact@v4
        with:
          name: zabbix-web-nginx-pgsql-latest
          path: zabbix-web-nginx-pgsql-latest.tar.gz

  Graylog:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Pull and save OpenSearch image
        run: |
           docker pull opensearchproject/opensearch:latest
           docker save opensearchproject/opensearch:latest  opensearch-latest.tar.gz 

      - name: Upload OpenSearch Image Artifact 
        uses: actions/upload-artifact@v4
        with:
          name: opensearch-latest
          path: opensearch-latest.tar.gz 

      - name: Pull and Save Graylog Image 
        run: |
          docker pull graylog/graylog:6.0.5
          docker save graylog/graylog:6.0.5 graylog-latest.tar.gz 

      - name: Upload Graylog Image Artifact 
        uses: actions/upload-artifact@v4
        with:
          name: graylog-latest
          path: graylog-latest.tar.gz 

  MongoDB:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Pull and Save MongoDB Image 
        run: |
          docker pull mongo:5.0.26 
          docker save mongo:5.0.26 mongo-5.0.26.tar.gz 

      - name: Upload MongoDB Image Artifact 
        uses: actions/upload-artifact@v4
        with:
          name: mongo-5.0.26
          path: mongo-5.0.26.tar.gz

  MySQL:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Pull and Save MySQL Image as File  
        run: |
          docker pull mysql:8.0.36 
          docker save mysql:8.0.36 mysql-8.0.36.tar.gz 

      - name: Upload MySQL Image Artifact  
        uses: actions/upload-artifact@v4 
        with:
          name: mysql-8.0.36  
          path: mysql-8.0.36.tar.gz 


  Grafana:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Pull and Save Grafana Image as File  
        run: |
          docker pull grafana/grafana:latest
          docker save grafana/grafana:latest grafana-latest.tar.gz

      - name: Upload Grafana Image Artifact  
        uses: actions/upload-artifact@v4 
        with:
          name: grafana-latest
          path: grafana-latest.tar.gz

  NetBox:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Pull and Save Grafana Image as File  
        run: |
          docker pull netboxcommunity/netbox:latest
          docker save netboxcommunity/netbox:latest netbox-latest.tar.gz

      - name: Upload Grafana Image Artifact  
        uses: actions/upload-artifact@v4 
        with:
          name: netbox-latest
          path: netbox-latest.tar.gz

  Grafana-OnCall:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Pull and Save Grafana OnCall Image as File  
        run: |
          docker pull grafana/oncall:latest
          docker save grafana/oncall:latest grafana-oncall-latest.tar.gz

      - name: Upload Grafana OnCall Image Artifact  
        uses: actions/upload-artifact@v4 
        with:
          name: grafana-oncall-latest
          path: grafana-oncall-latest.tar.gz
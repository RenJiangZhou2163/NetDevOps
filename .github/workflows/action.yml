name: Pull and Save Multiple Docker Images

on:
  push:
    branches:
      - main

jobs:
  pull_and_save:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v1

      # zabbix/zabbix-server-pgsql:latest 
      - name: Pull Zabbix Server PostgreSQL image
        run: |
          docker pull zabbix/zabbix-server-pgsql:latest

      - name: Save Zabbix Server PostgreSQL image as file
        run: |
          docker save zabbix/zabbix-server-pgsql:latest | gzip > zabbix-server-pgsql-latest.tar.gz

      # zabbix/zabbix-proxy-mysql:latest
      - name: Pull Zabbix Proxy MySQL image
        run: |
          docker pull zabbix/zabbix-proxy-mysql:latest

      - name: Save Zabbix Proxy MySQL image as file
        run: |
          docker save zabbix/zabbix-proxy-mysql:latest | gzip > zabbix-proxy-mysql-latest.tar.gz

      # zabbix/zabbix-web-nginx-pgsql:latest
      - name: Pull Zabbix Web Nginx PostgreSQL image
        run: |
          docker pull zabbix/zabbix-web-nginx-pgsql:latest

      - name: Save Zabbix Web Nginx PostgreSQL image as file
        run: |
          docker save zabbix/zabbix-web-nginx-pgsql:latest | gzip > zabbix-web-nginx-pgsql-latest.tar.gz

      # prom/alertmanager:latest
      - name: Pull Prometheus Alertmanager image
        run: |
          docker pull prom/alertmanager:latest

      - name: Save Prometheus Alertmanager image as file
        run: |
          docker save prom/alertmanager:latest | gzip > prom-alertmanager-latest.tar.gz

      # opensearchproject/opensearch:latest
      - name: Pull OpenSearch image
        run: |
          docker pull opensearchproject/opensearch:latest

      - name: Save OpenSearch image as file
        run: |
          docker save opensearchproject/opensearch | gzip > opensearch-latest.tar.gz

      # graylog/graylog:latest
      - name: Pull Graylog image
        run: |
          docker pull graylog/graylog:latest

      - name: Save Graylog image as file
        run: |
          docker save graylog/graylog:latest | gzip > graylog-latest.tar.gz
      
      # mongo:5.0.26
      - name: Pull MongoDB image
        run: |
          docker pull mongo:5.0.26

      - name: Save MongoDB image as file
        run: |
          docker save mongo:5.0.26 | gzip > mongo-5.0.26.tar.gz
      
      # mysql/mysql-server:8.0.36
      - name: Pull MySQL image
        run:
          docker pull mysql/mysql-server:8.0.36
  
      - name : Save MySQL Image as file 
        run :
           docker save mysql/mysql-server:8.0.36  | gzip > mysql-8.0.36.tar.gz
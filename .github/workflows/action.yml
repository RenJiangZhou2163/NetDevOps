name: Pull and Save Multiple Docker Images

on:
  push:
    branches:
      - main

jobs:
  pull_and_save:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v1

      - name: Pull and save Zabbix Server PostgreSQL image
        run: |
          docker pull zabbix/zabbix-server-pgsql:latest
          docker save zabbix/zabbix-server-pgsql:latest | gzip > zabbix-server-pgsql-latest.tar.gz

      - name: Pull and save Zabbix Proxy MySQL image
        run: |
          docker pull zabbix/zabbix-proxy-mysql:latest
          docker save zabbix/zabbix-proxy-mysql:latest | gzip > zabbix-proxy-mysql-latest.tar.gz

      - name: Pull and save Zabbix Web Nginx PostgreSQL image
        run: |
          docker pull zabbix/zabbix-web-nginx-pgsql:latest
          docker save zabbix/zabbix-web-nginx-pgsql:latest | gzip > zabbix-web-nginx-pgsql-latest.tar.gz

      - name: Pull and save Prometheus Alertmanager image
        run: |
          docker pull prom/alertmanager:latest
          docker save prom/alertmanager:latest | gzip > prom-alertmanager-latest.tar.gz

      - name: Pull and save OpenSearch image
        run: |
          docker pull opensearchproject/opensearch:latest
          docker save opensearchproject/opensearch:latest | gzip > opensearch-latest.tar.gz

      - name: Pull and save Graylog image
        run: |
          docker pull graylog/graylog:5.2.6
          docker save graylog/graylog:5.2.6 | gzip > graylog-5.2.6.tar.gz
      
      - name: Pull and save MongoDB image
        run: |
          docker pull mongo:5.0.26
          docker save mongo:5.0.26 | gzip > mongo-5.0.26.tar.gz
      
      - name : Pull and Save MySQL Image 
        run :
           docker pull mysql/mysql-server:8.0.36 
           docker save mysql/mysql-server:8.0.36 | gzip > mysql-8.0.36.tar.gz 

      - name : Upload artifacts (saved images)
        uses : actions/upload-artifact@v2 
        with :
            name : saved-docker-images-${{ github.sha }}
            path : |
              zabbix-server-pgsql-latest.tar.gz 
              zabbix-proxy-mysql-latest.tar.gz 
              zabbix-web-nginx-pgsql-latest.tar.gz 
              prom-alertmanager-latest.tar.gz 
              opensearch-latest.tar.gz 
              graylog-5.2.6.tar.gz 
              mongo-5.0.26.tar.gz 
              mysql-8.0.36.tar.gz 


name: Pull and Save Multiple Common Docker Images

on:
  push:
    branches:
      - main

jobs:
  Common:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Pull and Save MongoDB Image 
        run: |
          docker pull mongo:5.0.26 
          docker save mongo:5.0.26 | gzip > mongo-5.0.26.tar.gz 

      - name: Upload MongoDB Image Artifact 
        uses: actions/upload-artifact@v3 
        with:
          name: mongo-5.0.26
          path: mongo-5.0.26.tar.gz

      - name: Pull and Save MySQL Image as File  
        run: |
          docker pull mysql:8.0.36 
          docker save mysql:8.0.36 | gzip > mysql-8.0.36.tar.gz 

      - name: Upload MySQL Image Artifact  
        uses: actions/upload-artifact@v3  
        with:
          name: mysql-8.0.36  
          ath: mysql-8.0.36.tar.gz 
